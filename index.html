            const toast = document.createElement('div');
            toast.className = 'toast-notify';
            toast.innerHTML = `<i class="fas ${icon === '✅' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateBadges() {
            const cartCount = cart.reduce((s,i)=> s + i.qty, 0);
            const cartBadge = document.getElementById('cartCount');
            if(cartCount > 0) { cartBadge.innerText = cartCount; cartBadge.style.display = 'flex'; }
            else cartBadge.style.display = 'none';

            const wishCount = wishlistIds.length;
            const wishBadge = document.getElementById('wishlistCount');
            if(wishCount > 0) { wishBadge.innerText = wishCount; wishBadge.style.display = 'flex'; }
            else wishBadge.style.display = 'none';
        }

        function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); renderCart(); updateDeliveryEstimate(); updateBadges(); }
        function saveWishlist() { localStorage.setItem('wishlist', JSON.stringify(wishlistIds)); updateBadges(); }

        function updateDeliveryEstimate() {
            const total = cart.reduce((sum,i)=> sum + (i.price * i.qty),0);
            let estimate = total > freeShippingThreshold ? `🚚 توصيل مجاني خلال 2-4 أيام` : `🚚 تكلفة التوصيل ${shippingCost} ${currency} (توصيل خلال 2-4 أيام)`;
            document.getElementById('deliveryEstimate').innerHTML = estimate;
        }

        // ========== تحديث المحتوى الديناميكي من appConfig.content ==========
        function applyDynamicContent() {
            const content = appConfig.content;
            document.getElementById('promoMarquee').innerHTML = content.promoBar || '';
            document.getElementById('heroTitle').innerText = content.heroTitle || '';
            document.getElementById('browseProductsBtn').innerText = content.heroBtn1 || '';
            document.getElementById('offersBtn').innerText = content.heroBtn2 || '';
            const trustContainer = document.getElementById('trustBadgesContainer');
            if (trustContainer && content.trustBadges) {
                trustContainer.innerHTML = content.trustBadges.map(badge => `<div class="trust-badge"><i class="${badge.icon}"></i> ${badge.text}</div>`).join('');
            }
            document.getElementById('footerExtra').innerHTML = content.footerExtra || '';
            document.getElementById('footerText').innerText = footerText;
        }

        // ========== عرض الأقسام والمنتجات ==========
        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = `<div class="cat-card ${activeCategory === 'الكل' ? 'active' : ''}" data-cat="الكل">الكل</div>` +
                categoriesList.map(cat => `<div class="cat-card ${activeCategory === cat ? 'active' : ''}" data-cat="${cat}">${cat}</div>`).join('');
            document.querySelectorAll('.cat-card').forEach(el => {
                el.addEventListener('click', () => {
                    activeCategory = el.dataset.cat;
                    renderProducts();
                    renderCategories();
                });
            });
        }

        function getFilteredProducts() {
            let filtered = products.filter(p => (activeCategory === 'الكل' || p.category === activeCategory) && p.name.includes(searchTerm));
            if (bestOnly) filtered = filtered.filter(p => p.bestSeller);
            if (sortPrice === 'low') filtered.sort((a,b) => a.price - b.price);
            if (sortPrice === 'high') filtered.sort((a,b) => b.price - a.price);
            return filtered;
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = getFilteredProducts();
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:2rem;">لا توجد منتجات مطابقة</div>';
                return;
            }
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" data-id="${p.id}">
                    <img class="product-img" loading="lazy" src="${p.img}" alt="${p.name}">
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="price">${p.price} ${currency}</div>
                        <div class="rating">⭐ ${p.rating || 0}</div>
                        <div class="card-actions">
                            <button class="add-to-cart" data-id="${p.id}"><i class="fas fa-cart-plus"></i> أضف</button>
                            <button class="wishlist-btn" data-id="${p.id}">${wishlistIds.includes(p.id) ? '❤️' : '🤍'}</button>
                            <button class="details-btn" data-id="${p.id}"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); addToCart(parseInt(btn.dataset.id)); }));
            document.querySelectorAll('.wishlist-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toggleWishlist(parseInt(btn.dataset.id)); renderProducts(); }));
            document.querySelectorAll('.details-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); showProductDetails(parseInt(btn.dataset.id)); }));
        }

        // ========== السلة ==========
        function addToCart(pid) {
            const existing = cart.find(i => i.id === pid);
            if(existing) existing.qty += 1;
            else cart.push({ id: pid, qty: 1, price: products.find(p=>p.id===pid).price, name: products.find(p=>p.id===pid).name });
            saveCart();
            showToast("تمت الإضافة إلى السلة", "✅");
        }

        function renderCart() {
            const container = document.getElementById('cartItemsList');
            if(cart.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:1rem;">السلة فارغة</div>';
                document.getElementById('cartTotal').innerHTML = '';
                return;
            }
            container.innerHTML = cart.map(item => {
                const prod = products.find(p=>p.id===item.id);
                return `
                    <div class="cart-item">
                        <img src="${prod.img}" width="45" height="45">
                        <div style="flex:1">
                            <b>${prod.name}</b><br>
                            ${prod.price} ${currency} × ${item.qty}
                            <div style="display:flex; gap:5px; margin-top:3px;">
                                <input type="number" min="1" value="${item.qty}" class="cart-qty" data-id="${item.id}" style="width:45px;">
                                <button class="remove-item" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            const total = cart.reduce((sum,i)=> sum + (i.price * i.qty),0);
            let finalTotal = appliedDiscount ? total * (1 - currentDiscount/100) : total;
            document.getElementById('cartTotal').innerHTML = `<h4>الإجمالي: ${finalTotal.toFixed(2)} ${currency} ${appliedDiscount?`(خصم ${currentDiscount}%)`:''}</h4>`;
            document.querySelectorAll('.cart-qty').forEach(inp => inp.addEventListener('change', (e) => {
                let id = parseInt(inp.dataset.id);
                let newQty = parseInt(inp.value);
                let item = cart.find(i=>i.id===id);
                if(item && newQty>0) item.qty = newQty;
                else if(newQty<=0) cart = cart.filter(i=>i.id!==id);
                saveCart();
                renderCart();
            }));
            document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', (e) => {
                let id = parseInt(btn.dataset.id);
                cart = cart.filter(i=>i.id!==id);
                saveCart();
                renderCart();
            }));
        }

        // ========== المفضلة ==========
        function toggleWishlist(pid) {
            if(wishlistIds.includes(pid)) wishlistIds = wishlistIds.filter(id=>id!==pid);
            else wishlistIds.push(pid);
            saveWishlist();
            renderProducts();
            showToast(wishlistIds.includes(pid) ? "أضيف للمفضلة" : "أزيل من المفضلة", "❤️");
        }

        function showWishlistModal() {
            const wishItems = products.filter(p=>wishlistIds.includes(p.id));
            document.getElementById('wishlistModalContent').innerHTML = `
                <i class="fas fa-times" id="closeWishModal" style="float:left; cursor:pointer;"></i>
                <h3>❤️ المفضلة</h3>
                ${wishItems.map(p=>`<div style="display:flex; gap:8px; margin:8px"><img src="${p.img}" width="40"><div>${p.name} - ${p.price} ${currency} <button class="addCartWish" data-id="${p.id}">أضف للسلة</button></div></div>`).join('')}
            `;
            document.querySelectorAll('.addCartWish').forEach(btn=>btn.addEventListener('click',(e)=>{ addToCart(parseInt(btn.dataset.id)); showWishlistModal(); }));
            document.getElementById('closeWishModal')?.addEventListener('click',()=>document.getElementById('wishlistModal').style.display='none');
            document.getElementById('wishlistModal').style.display='flex';
        }

        // ========== تفاصيل المنتج ==========
        function showProductDetails(pid) {
            const p = products.find(p=>p.id===pid);
            if(!p) return;
            const similar = products.filter(prod=>prod.category===p.category && prod.id!==pid).slice(0,3);
            document.getElementById('modalContent').innerHTML = `
                <i class="fas fa-times" style="position:absolute; top:0.8rem; left:0.8rem; font-size:1.2rem; cursor:pointer;" id="closeModalBtn"></i>
                <h2>${p.name}</h2>
                <div style="display:flex; gap:8px; overflow-x:auto; margin:0.8rem 0;">
                    <img src="${p.img}" width="100" style="border-radius:12px;">${p.imgs?.map(img=>`<img src="${img}" width="100" style="border-radius:12px;">`).join('')||''}
                </div>
                <p><strong>الفوائد:</strong> ${p.benefits || 'مفيد للصحة العامة'}</p>
                <p><strong>طريقة الاستخدام:</strong> ${p.usage || 'حسب الرغبة'}</p>
                <p><strong>السعر:</strong> ${p.price} ${currency}</p>
                <div><strong>التقييمات:</strong> ${p.reviews?.map(r=>`⭐ ${r}`).join(' - ') || 'لا توجد تقييمات'}</div>
                <div style="margin:0.8rem 0;">
                    <button id="shareProductBtn" class="btn-gold" data-id="${p.id}"><i class="fas fa-share-alt"></i> مشاركة المنتج</button>
                </div>
                <h3>منتجات مشابهة</h3>
                <div style="display:flex; gap:8px; overflow-x:auto;">${similar.map(s=>`<div><img src="${s.img}" width="70" style="border-radius:8px;"><br>${s.name}</div>`).join('')}</div>
                <button class="add-to-cart-modal btn-gold" data-id="${p.id}" style="margin-top:0.8rem;">➕ أضف للسلة</button>
            `;
            document.getElementById('productModal').style.display = 'flex';
            document.getElementById('closeModalBtn').onclick = () => document.getElementById('productModal').style.display = 'none';
            document.querySelector('.add-to-cart-modal')?.addEventListener('click',()=>{ addToCart(p.id); document.getElementById('productModal').style.display='none'; });
            document.getElementById('shareProductBtn')?.addEventListener('click', () => {
                const shareUrl = `${window.location.origin}?product=${p.id}`;
                navigator.clipboard.writeText(shareUrl);
                showToast("تم نسخ رابط المنتج", "🔗");
            });
        }

        // ========== إدارة المستخدمين (العملاء) ==========
        function renderUserModal() {
            if(loggedUser){
                const userOrders = orders.filter(o=>o.userEmail === loggedUser.email);
                document.getElementById('userModalContent').innerHTML = `
                    <i class="fas fa-times" id="closeUserModal" style="float:left; cursor:pointer;"></i>
                    <h3>مرحباً ${loggedUser.name}</h3>
                    <button id="logoutBtn" class="btn-gold" style="margin:8px 0;">تسجيل خروج</button>
                    <h4>عناويني</h4><p>${loggedUser.address || 'لا يوجد عنوان محفوظ'}</p>
                    <h4>طلباتي</h4>
                    ${userOrders.map(order=>`<div>طلب رقم ${order.id} - الحالة: ${order.status} - الإجمالي: ${order.total} ${currency}</div>`).join('')||'لا توجد طلبات'}
                    <h4>تتبع الطلب</h4>
                    <select id="trackOrderSelect">${userOrders.map(order=>`<option value="${order.id}">طلب ${order.id} - ${order.status}</option>`).join('')}</select>
                    <button id="trackBtn" class="btn-gold">تتبع</button>
                    <div id="trackResult"></div>
                `;
                document.getElementById('logoutBtn')?.addEventListener('click',()=>{ loggedUser=null; localStorage.removeItem('loggedUser'); renderUserModal(); document.getElementById('userModal').style.display='none'; location.reload(); });
                document.getElementById('trackBtn')?.addEventListener('click',()=>{
                    const orderId = parseInt(document.getElementById('trackOrderSelect').value);
                    const ord = userOrders.find(o=>o.id===orderId);
                    document.getElementById('trackResult').innerHTML = `<span>الحالة: ${ord.status} - ${ord.status==='جاري التجهيز'?'⏳':ord.status==='خرج للتوصيل'?'🚚':'✅ تم التسليم'}</span>`;
                });
            } else {
                document.getElementById('userModalContent').innerHTML = `
                    <i class="fas fa-times" id="closeUserModal" style="float:left; cursor:pointer;"></i>
                    <h3>تسجيل الدخول / حساب جديد</h3>
                    <input type="text" id="loginEmail" placeholder="البريد الإلكتروني" style="width:100%; margin:5px 0; padding:6px;"><br>
                    <input type="password" id="loginPass" placeholder="كلمة المرور" style="width:100%; margin:5px 0; padding:6px;"><br>
                    <button id="doLogin" class="btn-gold">دخول</button><hr>
                    <input type="text" id="regName" placeholder="الاسم" style="width:100%; margin:5px 0; padding:6px;"><br>
                    <input type="text" id="regEmail" placeholder="البريد" style="width:100%; margin:5px 0; padding:6px;"><br>
                    <input type="password" id="regPass" placeholder="كلمة المرور" style="width:100%; margin:5px 0; padding:6px;"><br>
                    <button id="doReg" class="btn-gold">تسجيل جديد</button>
                `;
                document.getElementById('doLogin')?.addEventListener('click',()=>{
                    const email = document.getElementById('loginEmail').value;
                    const pass = document.getElementById('loginPass').value;
                    const user = users.find(u=>u.email===email && u.pass===pass);
                    if(user){ loggedUser = user; localStorage.setItem('loggedUser',JSON.stringify(user)); renderUserModal(); document.getElementById('userModal').style.display='none'; renderProducts(); showToast("تم تسجيل الدخول"); } else showToast("بيانات غير صحيحة", "❌");
                });
                document.getElementById('doReg')?.addEventListener('click',()=>{
                    const name = document.getElementById('regName').value, email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value;
                    if(users.find(u=>u.email===email)) showToast("البريد موجود", "❌");
                    else { const newUser = { name, email, pass, address: "" }; users.push(newUser); syncAppConfig(); showToast("تم التسجيل"); }
                });
            }
            document.getElementById('closeUserModal')?.addEventListener('click',()=>document.getElementById('userModal').style.display='none');
            document.getElementById('userModal').style.display='flex';
        }

        // ========== إتمام الطلب ==========
        function openCheckout() {
            if(!loggedUser){ showToast("يجب تسجيل الدخول أولاً", "❌"); renderUserModal(); return; }
            if(cart.length===0){ showToast("السلة فارغة", "❌"); return; }
            const total = cart.reduce((sum,i)=> sum + (i.price * i.qty),0);
            const finalTotal = appliedDiscount ? total * (1-currentDiscount/100) : total;

            document.getElementById('checkoutModalContent').innerHTML = `
                <i class="fas fa-times" id="closeCheckout" style="float:left; cursor:pointer;"></i>
                <h3>إتمام الطلب</h3>
                <p><strong>الإجمالي:</strong> ${finalTotal.toFixed(2)} ${currency}</p>
                <div style="margin:10px 0;">
                    <label>طريقة الدفع:</label>
                    <select id="paymentMethod" style="width:100%; padding:6px; border-radius:1.5rem;">
                        <option value="cash">الدفع عند الاستلام</option>
                        <option value="vodafone">فودافون كاش</option>
                    </select>
                </div>
                <div id="vodafoneDetails" style="display:none;" class="payment-details">
                    <p><strong>📱 التحويل عبر فودافون كاش</strong></p>
                    <p>رقم التحويل: <strong dir="ltr">${vodafoneNumber}</strong> 
                        <button id="copyVodafoneBtn" class="copy-number"><i class="fas fa-copy"></i> نسخ</button>
                    </p>
                    <input type="text" id="transactionId" placeholder="رقم عملية التحويل (اختياري)" style="width:100%; margin-top:5px; padding:5px; border-radius:1rem;">
                </div>
                <div style="margin:10px 0;">
                    <label>عنوان التوصيل:</label>
                    <input type="text" id="deliveryAddress" placeholder="العنوان بالكامل" value="${loggedUser.address || ''}" style="width:100%; padding:6px; border-radius:1rem;">
                </div>
                <button id="placeOrderBtn" class="btn-gold" style="width:100%; margin-top:10px;">تأكيد الطلب وإرسال عبر واتساب</button>
            `;

            const paymentSelect = document.getElementById('paymentMethod');
            const vodafoneDiv = document.getElementById('vodafoneDetails');
            paymentSelect.addEventListener('change', () => {
                vodafoneDiv.style.display = paymentSelect.value === 'vodafone' ? 'block' : 'none';
            });

            document.getElementById('copyVodafoneBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(vodafoneNumber);
                showToast("تم نسخ رقم التحويل", "📋");
            });

            document.getElementById('placeOrderBtn').addEventListener('click', () => {
                const address = document.getElementById('deliveryAddress').value;
                if(!address){ showToast("أدخل عنوان التوصيل", "❌"); return; }
                const paymentMethod = paymentSelect.value;
                let transactionId = '';
                if(paymentMethod === 'vodafone') {
                    transactionId = document.getElementById('transactionId')?.value || '';
                    if(!transactionId && !confirm("لم تقم بإدخال رقم العملية. هل تريد المتابعة؟")) return;
                }

                let itemsList = cart.map(item => {
                    const prod = products.find(p=>p.id===item.id);
                    return `• ${prod.name} (${item.qty} × ${prod.price} ${currency})`;
                }).join('\n');
                let message = `🛍️ *طلب جديد من عطارة الرؤى*\n\n👤 *العميل:* ${loggedUser.name}\n📧 ${loggedUser.email}\n📍 *العنوان:* ${address}\n💳 *طريقة الدفع:* ${paymentMethod === 'vodafone' ? 'فودافون كاش' : 'الدفع عند الاستلام'}`;
                if(paymentMethod === 'vodafone') message += `\n📲 *رقم التحويل:* ${vodafoneNumber}\n🔢 *رقم العملية:* ${transactionId || 'لم يتم إدخاله'}`;
                message += `\n\n📦 *المنتجات:*\n${itemsList}\n\n💰 *الإجمالي:* ${finalTotal.toFixed(2)} ${currency}`;
                if(appliedDiscount) message += `\n🎁 *خصم:* ${currentDiscount}%`;
                message += `\n\n📅 *التاريخ:* ${new Date().toLocaleString('ar-EG')}`;
                
                const newOrder = { id: Date.now(), userEmail: loggedUser.email, items: [...cart], total: finalTotal, status: "جاري التجهيز", date: new Date().toLocaleString(), paymentMethod, transactionId };
                orders.push(newOrder);
                syncAppConfig();
                
                const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, '_blank');
                
                cart = []; appliedDiscount=false; currentDiscount=0;
                saveCart();
                document.getElementById('checkoutModal').style.display='none';
                showToast("تم إرسال طلبك عبر واتساب");
            });

            document.getElementById('closeCheckout').onclick = () => document.getElementById('checkoutModal').style.display='none';
            document.getElementById('checkoutModal').style.display='flex';
        }

        // ========== الاستماع لتغييرات localStorage (للتحديث الفوري عند تعديلات admin) ==========
        function handleStorageChange(e) {
            if (e.key === 'appConfig') {
                const newConfig = JSON.parse(e.newValue);
                if (newConfig) {
                    // تحديث جميع المتغيرات
                    products = newConfig.products;
                    categoriesList = newConfig.categoriesList;
                    whatsappNumber = newConfig.whatsappNumber;
                    facebookUrl = newConfig.facebookUrl;
                    footerText = newConfig.footerText;
                    discountCode = newConfig.discountCode;
                    discountPercent = newConfig.discountPercent;
                    vodafoneNumber = newConfig.vodafoneNumber;
                    currency = newConfig.currency;
                    freeShippingThreshold = newConfig.freeShippingThreshold;
                    shippingCost = newConfig.shippingCost;
                    users = newConfig.users;
                    orders = newConfig.orders;
                    // تحديث الواجهة
                    applyDynamicContent();
                    renderCategories();
                    renderProducts();
                    renderCart(); // لتحديث العملة في السلة
                    updateDeliveryEstimate();
                    showToast("تم تحديث بيانات المتجر", "🔄");
                }
            }
        }
        window.addEventListener('storage', handleStorageChange);

        // ========== ربط الأحداث والتهيئة ==========
        function bindEvents() {
            document.getElementById('cartIcon').onclick = () => { document.getElementById('cartSidebar').classList.add('open'); document.getElementById('cartOverlay').style.display='block'; renderCart(); };
            document.getElementById('closeCart').onclick = () => { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('cartOverlay').style.display='none'; };
            document.getElementById('cartOverlay').onclick = () => { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('cartOverlay').style.display='none'; };
            document.getElementById('userIcon').onclick = () => renderUserModal();
            document.getElementById('wishlistIcon').onclick = () => showWishlistModal();
            document.getElementById('applyDiscountBtn').onclick = () => {
                const code = document.getElementById('discountCode').value;
                if(code === discountCode){ appliedDiscount=true; currentDiscount=discountPercent; renderCart(); showToast(`خصم ${discountPercent}% مفعل`, "🎁"); }
                else showToast("كود غير صالح", "❌");
            };
            document.getElementById('checkoutBtn').onclick = () => openCheckout();
            document.getElementById('browseProductsBtn').onclick = () => document.getElementById('productsGrid').scrollIntoView({behavior:'smooth'});
            document.getElementById('offersBtn').onclick = () => { activeCategory="الكل"; bestOnly=true; renderProducts(); renderCategories(); };
            document.getElementById('searchInput').addEventListener('input',(e)=>{ searchTerm=e.target.value; renderProducts(); });
            document.getElementById('priceFilter').addEventListener('change',(e)=>{ sortPrice=e.target.value; renderProducts(); });
            document.getElementById('bestSellerOnly').addEventListener('change',(e)=>{ bestOnly=e.target.checked; renderProducts(); });
            document.querySelectorAll('[data-nav]').forEach(link=>{ link.addEventListener('click',(e)=>{
                if(link.dataset.nav==='home') window.scrollTo({top:0,behavior:'smooth'});
                else if(link.dataset.nav==='products') document.getElementById('productsGrid').scrollIntoView({behavior:'smooth'});
                else if(link.dataset.nav==='offers'){ bestOnly=true; renderProducts(); renderCategories(); }
                else if(link.dataset.nav==='about') showToast("عطارة الرؤى - منذ 2005 نقدم أفضل الأعشاب");
                else if(link.dataset.nav==='contact') showToast(`تواصل عبر واتساب +${whatsappNumber}`);
            }); });
            document.getElementById('floatWhatsapp').onclick = () => window.open(`https://wa.me/${whatsappNumber}?text=أهلاً أحتاج مساعدة`);
            document.getElementById('floatFacebook').onclick = () => window.open(facebookUrl);
            document.getElementById('whatsappFooter').onclick = () => window.open(`https://wa.me/${whatsappNumber}`);
            document.getElementById('facebookFooter').onclick = () => window.open(facebookUrl);
            const backToTop = document.getElementById('backToTop');
            window.addEventListener('scroll', () => backToTop.classList.toggle('show', window.scrollY > 300));
            backToTop.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function init() {
            applyDynamicContent();
            renderCategories();
            renderProducts();
            renderCart();
            updateBadges();
            updateDeliveryEstimate();
            bindEvents();
        }

        init();
    })();
